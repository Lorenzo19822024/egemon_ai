<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Il Ciclo Cognitivo — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060810; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  svg { max-width: 90vmin; max-height: 90vmin; }
  /* Force Inter on all SVG text */
  svg text { font-family: 'Inter', sans-serif !important; }
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" width="900" height="900">
  <defs>
    <radialGradient id="bgGlow1" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#5b52f0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#060810" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="35%" cy="65%" r="40%">
      <stop offset="0%" stop-color="#9b8eff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#060810" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b52f0"/>
      <stop offset="50%" stop-color="#9b8eff"/>
      <stop offset="100%" stop-color="#5b52f0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0b8ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="arrowG12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b8eff"/>
      <stop offset="100%" stop-color="#6b8ef0"/>
    </linearGradient>
    <linearGradient id="arrowG23" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b8ef0"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="arrowG34" x1="100%" y1="100%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="arrowG45" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="arrowG51" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9b8eff"/>
    </linearGradient>
    <radialGradient id="nodeGrad1" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#9b8eff"/>
      <stop offset="60%" stop-color="#6b5ff0"/>
      <stop offset="100%" stop-color="#3a2fa0"/>
    </radialGradient>
    <radialGradient id="nodeGrad2" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#8eaaff"/>
      <stop offset="60%" stop-color="#5b7ef0"/>
      <stop offset="100%" stop-color="#2a4fa0"/>
    </radialGradient>
    <radialGradient id="nodeGrad3" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </radialGradient>
    <radialGradient id="nodeGrad4" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="60%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#a16207"/>
    </radialGradient>
    <radialGradient id="nodeGrad5" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="saturate" values="1.5" result="saturated"/>
      <feMerge><feMergeNode in="saturated"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="arrowGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="centerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr12" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M 0 1 L 13 6 L 0 11 L 3 6 Z" fill="#6b8ef0"/>
    </marker>
    <marker id="arr23" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M 0 1 L 13 6 L 0 11 L 3 6 Z" fill="#22c55e"/>
    </marker>
    <marker id="arr34" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M 0 1 L 13 6 L 0 11 L 3 6 Z" fill="#eab308"/>
    </marker>
    <marker id="arr45" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M 0 1 L 13 6 L 0 11 L 3 6 Z" fill="#c084fc"/>
    </marker>
    <marker id="arr51" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M 0 1 L 13 6 L 0 11 L 3 6 Z" fill="#9b8eff"/>

  <!-- Background -->
  <rect width="900" height="900" fill="#060810"/>
  <rect width="900" height="900" fill="url(#bgGlow1)"/>
  <rect width="900" height="900" fill="url(#bgGlow2)"/>

  <circle cx="450" cy="450" r="375" fill="none" stroke="#5b52f0" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="450" cy="450" r="340" fill="none" stroke="#9b8eff" stroke-opacity="0.04" stroke-width="0.5" stroke-dasharray="2 8"/>
  <circle cx="450" cy="450" r="280" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-opacity="0.2"/>
  <circle cx="450" cy="450" r="280" fill="none" stroke="#9b8eff" stroke-opacity="0.07" stroke-width="6"/>
  <circle cx="450" cy="450" r="155" fill="none" stroke="#5b52f0" stroke-opacity="0.06" stroke-width="0.8" stroke-dasharray="3 8"/>

  <!-- Arrows -->
  <path d="M 508,182 A 295,295 0 0,1 710,308" fill="none" stroke="url(#arrowG12)" stroke-width="2.8" stroke-opacity="0.85" marker-end="url(#arr12)" filter="url(#arrowGlow)"/>
  <path d="M 738,420 A 295,295 0 0,1 655,650" fill="none" stroke="url(#arrowG23)" stroke-width="2.8" stroke-opacity="0.85" marker-end="url(#arr23)" filter="url(#arrowGlow)"/>
  <path d="M 558,705 A 295,295 0 0,1 338,705" fill="none" stroke="url(#arrowG34)" stroke-width="2.8" stroke-opacity="0.85" marker-end="url(#arr34)" filter="url(#arrowGlow)"/>
  <path d="M 242,650 A 295,295 0 0,1 163,420" fill="none" stroke="url(#arrowG45)" stroke-width="2.8" stroke-opacity="0.85" marker-end="url(#arr45)" filter="url(#arrowGlow)"/>
  <path d="M 192,308 A 295,295 0 0,1 392,182" fill="none" stroke="url(#arrowG51)" stroke-width="2.8" stroke-opacity="0.85" marker-end="url(#arr51)" filter="url(#arrowGlow)"/>

  <!-- NODE 1: CONOSCENZA -->
  <g filter="url(#nodeGlow)">
    <circle cx="450" cy="170" r="62" fill="url(#nodeGrad1)" opacity="0.92"/>
    <circle cx="450" cy="170" r="62" fill="none" stroke="#c0b8ff" stroke-width="1.2" stroke-opacity="0.5"/>
  </g>
  <text x="450" y="166" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#fff" letter-spacing="1.2">CONOSCENZA</text>
  <text x="450" y="184" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#d0d8e8">Knowledge Base</text>

  <!-- NODE 2: CONSAPEVOLEZZA -->
  <g filter="url(#nodeGlow)">
    <circle cx="716" cy="364" r="62" fill="url(#nodeGrad2)" opacity="0.92"/>
    <circle cx="716" cy="364" r="62" fill="none" stroke="#8eaaff" stroke-width="1.2" stroke-opacity="0.5"/>
  </g>
  <text x="716" y="353" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#fff" letter-spacing="1.2">CONSAPE-</text>
  <text x="716" y="371" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#fff" letter-spacing="1.2">VOLEZZA</text>
  <text x="716" y="390" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#d0d8e8">Context &amp; Genome</text>

  <!-- NODE 3: ESECUZIONE -->
  <g filter="url(#nodeGlow)">
    <circle cx="615" cy="677" r="62" fill="url(#nodeGrad3)" opacity="0.92"/>
    <circle cx="615" cy="677" r="62" fill="none" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.5"/>
  </g>
  <text x="615" y="673" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#fff" letter-spacing="1.2">ESECUZIONE</text>
  <text x="615" y="691" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#d0d8e8">Quality Gate</text>

  <!-- NODE 4: FORMAZIONE -->
  <g filter="url(#nodeGlow)">
    <circle cx="285" cy="677" r="62" fill="url(#nodeGrad4)" opacity="0.92"/>
    <circle cx="285" cy="677" r="62" fill="none" stroke="#fcd34d" stroke-width="1.2" stroke-opacity="0.5"/>
  </g>
  <text x="285" y="673" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#fff" letter-spacing="1.2">FORMAZIONE</text>
  <text x="285" y="691" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#d0d8e8">User Interaction</text>

  <!-- NODE 5: AUTOPOIESI -->
  <g filter="url(#nodeGlow)">
    <circle cx="184" cy="364" r="62" fill="url(#nodeGrad5)" opacity="0.92"/>
    <circle cx="184" cy="364" r="62" fill="none" stroke="#d8b4fe" stroke-width="1.2" stroke-opacity="0.5"/>
  </g>
  <text x="184" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#fff" letter-spacing="1.2">AUTOPOIESI</text>
  <text x="184" y="378" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#d0d8e8">Evoluzione continua</text>

  <!-- CENTER -->
  <circle cx="450" cy="440" r="100" fill="#5b52f0" opacity="0.05" filter="url(#centerGlow)"/>
  <text x="450" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#9b8eff" letter-spacing="4">IL CICLO COGNITIVO</text>
  <text x="450" y="432" text-anchor="middle" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="url(#titleGrad)" letter-spacing="0.5" filter="url(#textGlow)">dell'Intelligenza</text>
  <text x="450" y="466" text-anchor="middle" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="url(#titleGrad)" letter-spacing="0.5" filter="url(#textGlow)">Eseguibile</text>
  <line x1="370" y1="480" x2="530" y2="480" stroke="url(#ringGrad)" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="450" y="500" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#8a9db5" letter-spacing="1.5">5 Principi Assiomatici</text>

  <!-- Particles -->
  <circle cx="160" cy="140" r="1.5" fill="#5b52f0" opacity="0.35"/>
  <circle cx="740" cy="180" r="1.2" fill="#9b8eff" opacity="0.3"/>
  <circle cx="770" cy="720" r="1.5" fill="#22c55e" opacity="0.25"/>
  <circle cx="130" cy="680" r="1.2" fill="#eab308" opacity="0.25"/>
  <circle cx="380" cy="95" r="1" fill="#c084fc" opacity="0.3"/>
  <circle cx="530" cy="810" r="1.3" fill="#5b52f0" opacity="0.2"/>
  <circle cx="820" cy="450" r="1" fill="#9b8eff" opacity="0.2"/>
  <circle cx="80" cy="500" r="1.2" fill="#c084fc" opacity="0.2"/>

  <!-- Footer -->
  <text x="450" y="860" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="300" fill="#8a9db5" letter-spacing="3" opacity="0.4">EGEMON.AI</text>
</svg>
